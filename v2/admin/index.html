<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Контент-завод Элдокс — черновик записи</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="section admin-shell">
      <p class="section-kicker">Контент-завод</p>
      <h1>Карточка будущей публикации</h1>
      <p>
        Рабочая форма для подготовки материала: тема, рубрика, короткое обещание для карточки и обложка. После редакционной
        проверки запись переносится в витрину публикаций и разворачивается в полноценную статью.
      </p>
      <form class="request-form">
        <label>Адрес материала<input type="text" placeholder="crm-not-working" /></label>
        <label>Рубрика<input type="text" placeholder="CRM" /></label>
        <label>Заголовок<input type="text" placeholder="CRM есть, но команда ее обходит: что проверить" /></label>
        <label>Анонс для карточки<textarea placeholder="Коротко: какая проблема разбирается и что человек сможет проверить после чтения"></textarea></label>
        <label>Обложка<input type="text" placeholder="../assets/article-saby.svg" /></label>
      </form>
    </main>
  </body>
</html>
