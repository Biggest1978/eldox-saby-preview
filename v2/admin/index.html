<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Контент-завод Элдокс — черновик записи</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="section admin-shell">
      <p class="section-kicker">Внутренний контур</p>
      <h1>Черновик записи для базы знаний</h1>
      <p>
        Это не публичная CMS и не защищенная админка. Это рабочая заготовка для контент-завода: сюда можно вставить тему,
        категорию, обложку и лид, затем перенести запись в `content/articles.json` и создать статью по шаблону.
      </p>
      <form class="request-form">
        <label>Slug<input type="text" placeholder="crm-not-working" /></label>
        <label>Категория<input type="text" placeholder="CRM" /></label>
        <label>Заголовок<input type="text" placeholder="CRM есть, но команда ее обходит: что проверить" /></label>
        <label>Краткое описание<textarea placeholder="1–2 предложения для карточки"></textarea></label>
        <label>Путь к обложке<input type="text" placeholder="../assets/hero.jpg" /></label>
      </form>
    </main>
  </body>
</html>
